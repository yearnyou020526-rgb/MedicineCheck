name: Build MedicineCheck APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle executable
        working-directory: medicine-check
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: medicine-check
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mkdir -p output
          cp medicine-check/app/build/outputs/apk/debug/app-debug.apk output/MedicineCheck.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedicineCheck.apk
          path: output/MedicineCheck.apk
